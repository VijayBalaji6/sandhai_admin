# Deploy Flutter Web to GitHub Pages.
#
# How config reaches the app (no env/*.env file in CI):
#   • Repository secrets are passed as --dart-define at *compile* time.
#   • AppEnv reads them via String.fromEnvironment (baked into the web bundle).
#   • Redeploy after changing secrets — values are fixed until the next build.
#
# Required secrets (either works):
#   • Repository secrets: Settings → Secrets → Actions → “Repository secrets”
#   • Or environment secrets on the env named below (this workflow uses dev).
#   • Keys: SUPABASE_URL, SUPABASE_ANON_KEY
# Pages: Settings → Pages → Build: GitHub Actions
# Site: https://<owner>.github.io/<repo>/

name: Deploy Flutter Web (WASM)

on:
  push:
    branches:
      - main

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Must match where your Supabase secrets live (e.g. Environment secrets → dev).
    # Using "github-pages" here would NOT see secrets stored only on dev/prod.
    environment:
      name: dev
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate files (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable web
        run: flutter config --enable-web

      # Fail fast if secrets are missing (empty values embed in build and break Supabase).
      - name: Check Supabase secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Add SUPABASE_URL and SUPABASE_ANON_KEY as repository secrets, or as secrets on the same environment as this job (currently: dev)."
            exit 1
          fi

      - name: Build Flutter Web (WASM)
        run: |
          flutter build web --wasm --release \
            --base-href=/${{ github.event.repository.name }}/ \
            --dart-define=ENV=dev \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
